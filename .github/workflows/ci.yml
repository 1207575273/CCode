# CI Pipeline — 类型检查 + 单元测试 + 构建验证 + Release Notes 生成
#
# 触发条件:
#   - release/* 分支 push（发版准备分支）
#   - v* tag push（打版本标签时）
#   - 任何分支向 main 的 PR（合并前门控）
#
# 不包含 npm publish:
#   npm 发包需要人工确认（版本号、changelog、构建产物检查），
#   自动发布风险高（误打 tag 即发包，无法撤回），保持手动 `npm publish` 流程。

name: CI

on:
  push:
    branches:
      - 'release/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

# 同分支新 push 自动取消旧的运行，节省 CI 分钟数
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: cCli

jobs:
  # ═══════════════════════════════════════
  # Job 1: 类型检查 + 单元测试
  # ═══════════════════════════════════════
  test:
    name: TypeCheck & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: cCli/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm test

  # ═══════════════════════════════════════
  # Job 2: 构建验证（CLI + Web）
  # ═══════════════════════════════════════
  build:
    name: Build Verify
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cCli/pnpm-lock.yaml

      - name: Install CLI dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI (tsup)
        run: pnpm run build

      - name: Verify CLI entry point exists
        run: |
          test -f dist/bin/ccli.js || (echo "ERROR: dist/bin/ccli.js not found" && exit 1)
          echo "CLI build OK: $(wc -c < dist/bin/ccli.js) bytes"

      - name: Install Web dependencies
        run: |
          cd web
          pnpm install --frozen-lockfile

      - name: Build Web Dashboard (Vite)
        run: |
          cd web
          pnpm build

      - name: Verify Web build output
        run: |
          # Vite outDir 配置为 ../dist/web（与 CLI 统一在 dist/ 下）
          test -f dist/web/index.html || (echo "ERROR: dist/web/index.html not found" && exit 1)
          echo "Web build OK: $(find dist/web -type f | wc -l) files"

      # tag push 时上传构建产物，方便手动发包前检查
      - name: Upload build artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ccode-cli-${{ github.ref_name }}
          path: |
            cCli/dist/bin/
            cCli/dist/web/
            cCli/package.json
          retention-days: 30

  # ═══════════════════════════════════════
  # Job 3: 自动生成 Release Notes（仅 tag push）
  # ═══════════════════════════════════════
  release-notes:
    name: Release Notes
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史，用于 git log 生成 changelog

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Find previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          echo "prev=${PREV:-$(git rev-list --max-parents=0 HEAD)}" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV="${{ steps.prev_tag.outputs.prev }}"

          # 从 CHANGELOG.md 提取当前版本段落
          VERSION_NUM="${TAG#v}"
          CHANGELOG_SECTION=""
          if [ -f CHANGELOG.md ]; then
            # 提取 ## [x.y.z] 到下一个 ## [ 之间的内容
            CHANGELOG_SECTION=$(awk "/^## \[${VERSION_NUM}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          fi

          # 生成 git commit 列表
          COMMITS=$(git log "${PREV}..HEAD" --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "- 初始发布")

          # 统计数据
          COMMIT_COUNT=$(git log "${PREV}..HEAD" --oneline --no-merges 2>/dev/null | wc -l | tr -d ' ')
          FILES_CHANGED=$(git diff "${PREV}..HEAD" --stat 2>/dev/null | tail -1 || echo "N/A")

          # 组装 release notes
          cat > /tmp/release-notes.md << 'NOTES_EOF'
          NOTES_EOF

          {
            echo "## CCode CLI ${TAG}"
            echo ""
            echo "**npm:** \`npm install -g ccode-cli@${VERSION_NUM}\`"
            echo ""

            if [ -n "$CHANGELOG_SECTION" ]; then
              echo "---"
              echo ""
              echo "$CHANGELOG_SECTION"
              echo ""
            fi

            echo "---"
            echo ""
            echo "### Commits (${COMMIT_COUNT})"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo ""
            echo "<details>"
            echo "<summary>Stats</summary>"
            echo ""
            echo "\`\`\`"
            echo "$FILES_CHANGED"
            echo "\`\`\`"
            echo ""
            echo "</details>"
          } > /tmp/release-notes.md

          cat /tmp/release-notes.md
        working-directory: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
