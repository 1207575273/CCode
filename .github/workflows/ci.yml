# CI Pipeline — 类型检查 + 单元测试 + 构建验证 + Release Notes
#
# 分支模型:
#   - main      — 主开发分支，接受 feat/* 等分支的 PR
#   - release   — 稳定发布分支，从 main 合入，push 即触发 CI + Release Notes
#   - feat/*    — 功能开发分支
#
# 触发条件:
#   - release 分支 push（发版）
#   - v* tag push（打版本标签时）
#   - 任何分支向 main 的 PR（合并前门控）
#
# Release Notes 策略:
#   - release 分支 → 生成 Draft Release（预览，可随时编辑/删除）
#   - v* tag push  → 正式发布 Release（含 CHANGELOG + git log + 统计）
#
# 不包含 npm publish:
#   npm 发包需要人工确认（版本号、changelog、构建产物检查），
#   自动发布风险高（误打 tag 即发包，无法撤回），保持手动 `npm publish` 流程。

name: CI

on:
  push:
    branches:
      - release
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

# 同分支新 push 自动取消旧的运行，节省 CI 分钟数
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: cCli

jobs:
  # ═══════════════════════════════════════
  # Job 1: 类型检查 + 单元测试
  # ═══════════════════════════════════════
  test:
    name: TypeCheck & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: cCli/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm test

  # ═══════════════════════════════════════
  # Job 2: 构建验证（CLI + Web）
  # ═══════════════════════════════════════
  build:
    name: Build Verify
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cCli/pnpm-lock.yaml

      - name: Install CLI dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI (tsup)
        run: pnpm run build

      - name: Verify CLI entry point exists
        run: |
          test -f dist/bin/ccli.js || (echo "ERROR: dist/bin/ccli.js not found" && exit 1)
          echo "CLI build OK: $(wc -c < dist/bin/ccli.js) bytes"

      - name: Install Web dependencies
        run: |
          cd web
          pnpm install --frozen-lockfile

      - name: Build Web Dashboard (Vite)
        run: |
          cd web
          pnpm build

      - name: Verify Web build output
        run: |
          # Vite outDir 配置为 ../dist/web（与 CLI 统一在 dist/ 下）
          test -f dist/web/index.html || (echo "ERROR: dist/web/index.html not found" && exit 1)
          echo "Web build OK: $(find dist/web -type f | wc -l) files"

      # tag push 或 release 分支：上传构建产物
      - name: Sanitize ref name for artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/release'
        id: artifact_name
        run: echo "name=ccode-cli-$(echo '${{ github.ref_name }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Upload build artifacts
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: |
            cCli/dist/bin/
            cCli/dist/web/
            cCli/package.json
          retention-days: 30

  # ═══════════════════════════════════════
  # Job 3: Release Notes
  #   - release/* 分支 → Draft 预览
  #   - v* tag        → 正式发布
  # ═══════════════════════════════════════
  release-notes:
    name: Release Notes
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/release'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史，用于 git log 生成 changelog

      - name: Determine release mode
        id: mode
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            # release 分支：从 package.json 读取版本号
            PKG_VERSION=$(node -p "require('./cCli/package.json').version")
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            echo "tag=v${PKG_VERSION}" >> "$GITHUB_OUTPUT"
            echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          fi
        working-directory: .

      - name: Find previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-version:refname | grep '^v' | head -1)
          echo "prev=${PREV:-$(git rev-list --max-parents=0 HEAD)}" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Generate release notes
        run: |
          TAG="${{ steps.mode.outputs.tag }}"
          VERSION="${{ steps.mode.outputs.version }}"
          IS_TAG="${{ steps.mode.outputs.is_tag }}"
          PREV="${{ steps.prev_tag.outputs.prev }}"

          # 从 CHANGELOG.md 提取当前版本段落
          CHANGELOG_SECTION=""
          if [ -f CHANGELOG.md ]; then
            CHANGELOG_SECTION=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          fi

          # 生成 git commit 列表（从上一个 tag 到当前）
          COMMITS=$(git log "${PREV}..HEAD" --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "- 初始发布")

          # 统计数据
          COMMIT_COUNT=$(git log "${PREV}..HEAD" --oneline --no-merges 2>/dev/null | wc -l | tr -d ' ')
          FILES_CHANGED=$(git diff "${PREV}..HEAD" --stat 2>/dev/null | tail -1 || echo "N/A")

          # 组装 release notes
          {
            if [ "$IS_TAG" = "false" ]; then
              echo "> **Draft** — 此为 \`${GITHUB_REF_NAME}\` 分支的预览版本，正式发布前可能继续变更。"
              echo ""
            fi

            echo "## CCode CLI ${TAG}"
            echo ""
            echo "**npm:** \`npm install -g ccode-cli@${VERSION}\`"
            echo ""

            if [ -n "$CHANGELOG_SECTION" ]; then
              echo "---"
              echo ""
              echo "$CHANGELOG_SECTION"
              echo ""
            fi

            echo "---"
            echo ""
            echo "### Commits since ${PREV} (${COMMIT_COUNT})"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo ""
            echo "<details>"
            echo "<summary>Stats</summary>"
            echo ""
            echo "\`\`\`"
            echo "$FILES_CHANGED"
            echo "\`\`\`"
            echo ""
            echo "</details>"
          } > /tmp/release-notes.md

          echo "=== Generated Release Notes ==="
          cat /tmp/release-notes.md
        working-directory: .

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.mode.outputs.tag }}
          name: ${{ steps.mode.outputs.tag }}
          body_path: /tmp/release-notes.md
          # release 分支 → draft 预览；tag push → 正式发布
          draft: ${{ steps.mode.outputs.is_tag == 'false' }}
          prerelease: ${{ contains(steps.mode.outputs.tag, '-') }}
